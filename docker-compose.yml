services:
  rag_api:
    image: dhiraj918106/rag-api:latest
    pull_policy: always
    container_name: rag-api
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    depends_on:
      - redis
    

  nginx:
    image: nginx:latest
    container_name: rag-nginx
    ports:
      - "80:80"
      - "443:443" # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # mount certs

    depends_on:
      - rag_api
  
  redis: 
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6380:6379"