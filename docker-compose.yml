services:
  rag_api:
    build: .
    container_name: rag-api
    env_file:
      - .env
    volumes:
      - ./data:/app/data  # persists FAISS + embeddings
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: rag-nginx
    ports:
      - "80:80"
      - "443:443" # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # mount certs

    depends_on:
      - rag_api
    